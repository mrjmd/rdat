<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domestic Art Tribunal Dashboard</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Recharts dependencies -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <!-- Babel for JSX compilation in-browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .thumbnail-popover {
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
            ScatterChart, Scatter, ZAxis, Cell, RadarChart, PolarGrid, 
            PolarAngleAxis, Radar 
        } = window.Recharts;

        // Association of pieces to images using the new naming convention
        const imageMap = {
            1: ["images/piece-1-1.jpeg", "images/piece-1-2.jpeg", "images/piece-1-3.jpeg"],
            2: ["images/piece-2.jpeg"],
            3: ["images/piece-3.jpeg"],
            4: ["images/piece-4.jpeg"],
            5: ["images/piece-5.jpeg"],
            6: ["images/piece-6.jpeg"],
            7: ["images/piece-7.jpeg"],
            8: ["images/piece-8.jpeg"],
            9: ["images/piece-9-1.jpeg", "images/piece-9-2.jpeg"],
            10: ["images/piece-10.jpeg"],
            11: ["images/piece-11.jpeg"],
            12: ["images/piece-12.jpeg"],
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const rawData = [
            { id: 1, scores: [44, 53, 43, 62, 55], criteria: { comp: [2,6,6,9,9], tech: [4,6,1,8,9], risk: [8,8,8,8,6], coh: [5,8,2,7,8], stare: [4,7,8,7,7], talk: [6,5,6,7,5], iden: [9,8,10,9,8], pret: [1,5,2,7,3] } },
            { id: 2, scores: [60, 33, 37, 58, 42], criteria: { comp: [9,4,7,7,9], tech: [5,2,3,8,6], risk: [8,2,8,8,6], coh: [10,2,1,7,2], stare: [6,7,10,9,10], talk: [10,8,5,8,7], iden: [7,2,2,5,0], pret: [0,5,1,6,2] } },
            { id: 3, scores: [19, 14, 20, 32, 10], criteria: { comp: [1,2,1,4,2], tech: [2,2,1,4,2], risk: [1,2,2,2,0], coh: [0,3,8,6,2], stare: [2,2,2,4,1], talk: [1,1,3,7,3], iden: [1,1,2,3,0], pret: [9,1,1,2,0] } },
            { id: 4, scores: [67, 54, 47, 48, 63], criteria: { comp: [9,8,5,6,8], tech: [10,7,3,6,7], risk: [9,5,8,5,9], coh: [9,6,10,5,8], stare: [9,7,10,7,9], talk: [9,8,8,8,8], iden: [10,7,2,4,9], pret: [2,6,1,7,5] } },
            { id: 5, scores: [67, 40, 48, 52, 63], criteria: { comp: [10,8,5,8,9], tech: [9,8,8,8,9], risk: [8,2,8,3,4], coh: [9,5,8,9,8], stare: [10,5,8,6,9], talk: [10,2,8,3,8], iden: [9,1,2,8,8], pret: [2,9,9,7,8] } },
            { id: 6, scores: [52, 22, 58, 54, 71], criteria: { comp: [8,5,9,8,10], tech: [9,3,7,7,10], risk: [3,1,7,7,5], coh: [8,3,7,8,10], stare: [9,3,8,8,9], talk: [5,2,9,6,9], iden: [7,3,10,5,10], pret: [3,2,1,5,8] } },
            { id: 7, scores: [56, 68, 38, 63, 71], criteria: { comp: [6,9,8,9,9], tech: [6,9,7,9,9], risk: [9,9,7,8,9], coh: [5,9,5,7,9], stare: [8,9,2,7,7], talk: [9,8,6,6,8], iden: [9,8,2,9,10], pret: [4,7,1,8,10] } },
            { id: 8, scores: [27, 33, 36, 50, 29], criteria: { comp: [2,8,3,8,9], tech: [3,7,4,7,8], risk: [3,1,7,3,0], coh: [1,5,7,4,2], stare: [3,5,9,4,2], talk: [5,3,3,8,4], iden: [1,1,2,7,2], pret: [9,3,1,9,2] } },
            { id: 9, scores: [30, 28, 41, 56, 67], criteria: { comp: [2,7,8,8,10], tech: [8,5,7,7,10], risk: [2,1,2,6,7], coh: [3,3,7,7,9], stare: [2,1,7,6,8], talk: [2,2,7,6,8], iden: [2,1,2,7,8], pret: [9,8,1,9,7] } },
            { id: 10, scores: [43, 9, 21, 35, 6], criteria: { comp: [3,1,5,5,2], tech: [4,1,2,6,2], risk: [8,1,2,3,0], coh: [8,1,2,7,0], stare: [4,1,5,3,0], talk: [2,1,2,3,0], iden: [5,1,2,2,2], pret: [9,2,1,6,0] } },
            { id: 11, scores: [39, 64, 20, 65, 45], criteria: { comp: [2,8,2,8,8], tech: [3,8,2,8,8], risk: [3,8,3,9,9], coh: [1,8,2,7,1], stare: [3,8,1,7,1], talk: [8,8,6,3,5], iden: [10,8,2,9,9], pret: [9,8,2,7,5] } },
            { id: 12, scores: [38, 23, 38, 57, 56], criteria: { comp: [9,3,7,8,8], tech: [5,3,7,7,7], risk: [2,2,2,7,6], coh: [8,2,8,7,7], stare: [2,1,5,7,7], talk: [3,2,5,7,7], iden: [2,1,2,6,7], pret: [7,9,2,8,7] } },
        ];

        const criteriaLabels = {
            comp: "Composition",
            tech: "Technical",
            risk: "Risk",
            coh: "Coherence",
            stare: "Stare Duration",
            talk: "Dialogue",
            iden: "Identity",
            pret: "Pretentiousness"
        };

        const getStdDev = (arr) => {
            const n = arr.length;
            const mean = arr.reduce((a, b) => a + b) / n;
            return Math.sqrt(arr.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / n);
        };

        // Component to render the thumbnail popover
        const ThumbnailPopover = ({ pieceId, position }) => {
            if (!pieceId || !position) return null;
            const images = imageMap[pieceId] || [];
            
            return (
                <div 
                    className="fixed z-[9999] bg-white p-2 rounded-xl shadow-2xl border border-slate-200 thumbnail-popover animate-in fade-in zoom-in duration-200"
                    style={{ 
                        left: position.x + 20, 
                        top: Math.min(position.y - 100, window.innerHeight - 300),
                        maxWidth: '320px'
                    }}
                >
                    <div className={`grid gap-1 ${images.length > 1 ? 'grid-cols-2' : 'grid-cols-1'}`}>
                        {images.map((src, idx) => (
                            <img 
                                key={idx} 
                                src={src} 
                                className="w-full h-auto rounded-lg object-cover max-h-48" 
                                alt={`Piece ${pieceId}`}
                                onError={(e) => { e.target.src = "https://placehold.co/400x300?text=No+Image"; }}
                            />
                        ))}
                    </div>
                    <div className="mt-2 text-center text-xs font-bold text-slate-500 uppercase tracking-tighter">
                        Piece {pieceId}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [selectedPiece, setSelectedPiece] = useState(null);
            const [hoveredPiece, setHoveredPiece] = useState(null);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });

            const analysis = useMemo(() => {
                return rawData.map(item => {
                    const avg = item.scores.reduce((a, b) => a + b) / item.scores.length;
                    const stdDev = getStdDev(item.scores);
                    const criteriaAvgs = Object.keys(item.criteria).map(key => ({
                        subject: criteriaLabels[key],
                        A: item.criteria[key].reduce((a, b) => a + b) / item.criteria[key].length,
                        fullMark: 10
                    }));
                    return {
                        id: item.id,
                        avg: parseFloat(avg.toFixed(1)),
                        stdDev: parseFloat(stdDev.toFixed(1)),
                        criteriaAvgs
                    };
                });
            }, []);

            const topConsensus = [...analysis].sort((a, b) => a.stdDev - b.stdDev).slice(0, 3);
            const topControversy = [...analysis].sort((a, b) => b.stdDev - a.stdDev).slice(0, 3);

            const handleMouseEnter = (id, e) => {
                setHoveredPiece(id);
                setMousePos({ x: e.clientX, y: e.clientY });
            };

            const handleMouseMove = (e) => {
                if (hoveredPiece) {
                    setMousePos({ x: e.clientX, y: e.clientY });
                }
            };

            const handleMouseLeave = () => {
                setHoveredPiece(null);
            };

            return (
                <div className="min-h-screen p-4 md:p-8" onMouseMove={handleMouseMove}>
                    <ThumbnailPopover pieceId={hoveredPiece} position={mousePos} />
                    
                    <header className="max-w-6xl mx-auto mb-8">
                        <h1 className="text-3xl font-bold text-slate-800">Domestic Art Tribunal</h1>
                        <p className="text-slate-500">Official Sentiment & Performance Dashboard</p>
                    </header>

                    <div className="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div className="flex items-center gap-3 mb-2 text-emerald-500">
                                <Icon name="check-circle" />
                                <h3 className="font-semibold text-slate-800">Highest Consensus</h3>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                {topConsensus.map(p => (
                                    <span 
                                        key={p.id} 
                                        onMouseEnter={(e) => handleMouseEnter(p.id, e)}
                                        onMouseLeave={handleMouseLeave}
                                        onClick={() => setSelectedPiece(p.id)}
                                        className="bg-emerald-50 text-emerald-700 px-3 py-1 rounded-full text-sm font-medium cursor-help transition-colors hover:bg-emerald-100"
                                    >
                                        Piece {p.id}
                                    </span>
                                ))}
                            </div>
                            <p className="text-xs text-slate-400 mt-3 italic">Judges were most aligned here.</p>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div className="flex items-center gap-3 mb-2 text-amber-500">
                                <Icon name="alert-circle" />
                                <h3 className="font-semibold text-slate-800">Most Controversial</h3>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                {topControversy.map(p => (
                                    <span 
                                        key={p.id} 
                                        onMouseEnter={(e) => handleMouseEnter(p.id, e)}
                                        onMouseLeave={handleMouseLeave}
                                        onClick={() => setSelectedPiece(p.id)}
                                        className="bg-amber-50 text-amber-700 px-3 py-1 rounded-full text-sm font-medium cursor-help transition-colors hover:bg-amber-100"
                                    >
                                        Piece {p.id}
                                    </span>
                                ))}
                            </div>
                            <p className="text-xs text-slate-400 mt-3 italic">These pieces split the room.</p>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div className="flex items-center gap-3 mb-2 text-blue-500">
                                <Icon name="trending-up" />
                                <h3 className="font-semibold text-slate-800">Top Performing</h3>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                {[...analysis].sort((a, b) => b.avg - a.avg).slice(0, 3).map(p => (
                                    <span 
                                        key={p.id} 
                                        onMouseEnter={(e) => handleMouseEnter(p.id, e)}
                                        onMouseLeave={handleMouseLeave}
                                        onClick={() => setSelectedPiece(p.id)}
                                        className="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-sm font-medium cursor-help transition-colors hover:bg-blue-100"
                                    >
                                        Piece {p.id}
                                    </span>
                                ))}
                            </div>
                            <p className="text-xs text-slate-400 mt-3 italic">Highest average scores.</p>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <h2 className="text-lg font-bold mb-6 flex items-center gap-2">
                                <Icon name="users" /> Overall Performance by Piece
                            </h2>
                            <div className="h-80 w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart 
                                        data={analysis}
                                        onMouseMove={(state) => {
                                            if (state.activePayload) {
                                                const id = state.activePayload[0].payload.id;
                                                setHoveredPiece(id);
                                            } else {
                                                setHoveredPiece(null);
                                            }
                                        }}
                                        onMouseLeave={() => setHoveredPiece(null)}
                                    >
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                        <XAxis dataKey="id" />
                                        <YAxis domain={[0, 80]} />
                                        <Tooltip cursor={{fill: '#f1f5f9'}} />
                                        <Bar dataKey="avg" name="Score" radius={[4, 4, 0, 0]} onClick={(data) => setSelectedPiece(data.id)}>
                                            {analysis.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={entry.avg > 50 ? '#3b82f6' : '#94a3b8'} className="cursor-pointer" />
                                            ))}
                                        </Bar>
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <h2 className="text-lg font-bold mb-6 flex items-center gap-2">
                                <Icon name="info" /> Controversy Map
                            </h2>
                            <div className="h-64 w-full">
                                <ResponsiveContainer width="100%" height="100%">
                                    <ScatterChart 
                                        margin={{ top: 20, right: 20, bottom: 20, left: 0 }}
                                        onMouseMove={(state) => {
                                            if (state.activePayload) {
                                                const id = state.activePayload[0].payload.id;
                                                setHoveredPiece(id);
                                            } else {
                                                setHoveredPiece(null);
                                            }
                                        }}
                                        onMouseLeave={() => setHoveredPiece(null)}
                                    >
                                        <CartesianGrid />
                                        <XAxis type="number" dataKey="avg" name="Score" domain={[0, 80]} />
                                        <YAxis type="number" dataKey="stdDev" name="StdDev" />
                                        <ZAxis type="number" range={[150, 150]} />
                                        <Tooltip 
                                            cursor={{ strokeDasharray: '3 3' }} 
                                            content={({ active, payload }) => {
                                                if (active && payload && payload.length) {
                                                    const data = payload[0].payload;
                                                    const thumb = imageMap[data.id]?.[0];
                                                    return (
                                                        <div className="bg-white p-3 rounded-xl shadow-2xl border border-slate-200 text-xs w-48 animate-in fade-in zoom-in duration-200">
                                                            <div className="mb-2 rounded-lg overflow-hidden border border-slate-100 h-24 bg-slate-50">
                                                                <img 
                                                                    src={thumb} 
                                                                    className="w-full h-full object-cover" 
                                                                    alt="" 
                                                                    onError={(e) => { e.target.src = "https://placehold.co/200x150?text=NA"; }}
                                                                />
                                                            </div>
                                                            <p className="font-bold text-slate-800 mb-1">Piece {data.id}</p>
                                                            <div className="flex justify-between">
                                                                <span className="text-slate-500">Avg Score:</span> 
                                                                <span className="font-mono">{data.avg}</span>
                                                            </div>
                                                            <div className="flex justify-between">
                                                                <span className="text-slate-500">StdDev:</span> 
                                                                <span className="font-mono">{data.stdDev}</span>
                                                            </div>
                                                        </div>
                                                    );
                                                }
                                                return null;
                                            }}
                                        />
                                        <Scatter data={analysis} onClick={(data) => setSelectedPiece(data.id)}>
                                            {analysis.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={entry.stdDev > 15 ? '#f59e0b' : '#10b981'} className="cursor-pointer" />
                                            ))}
                                        </Scatter>
                                    </ScatterChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-6xl mx-auto mt-8">
                        <div className="bg-slate-800 text-white p-8 rounded-2xl shadow-lg relative overflow-hidden">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4 relative z-10">
                                <div>
                                    <h2 className="text-2xl font-bold">Piece Deep Dive</h2>
                                    <p className="text-slate-400">Select a piece to see its profile</p>
                                </div>
                                <select 
                                    className="bg-slate-700 border-none rounded-lg px-4 py-2 text-white focus:ring-2 focus:ring-blue-500 outline-none"
                                    value={selectedPiece || ""}
                                    onChange={(e) => setSelectedPiece(parseInt(e.target.value))}
                                >
                                    <option value="" disabled>Select Piece...</option>
                                    {analysis.map(p => <option key={p.id} value={p.id}>Piece {p.id}</option>)}
                                </select>
                            </div>

                            {selectedPiece ? (
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center relative z-10">
                                    <div className="h-80 w-full relative group">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <RadarChart cx="50%" cy="50%" outerRadius="80%" data={analysis.find(p => p.id === selectedPiece).criteriaAvgs}>
                                                <PolarGrid stroke="#475569" />
                                                <PolarAngleAxis dataKey="subject" tick={{ fill: '#94a3b8', fontSize: 10 }} />
                                                <Radar name="Aesthetics" dataKey="A" stroke="#3b82f6" fill="#3b82f6" fillOpacity={0.6} />
                                            </RadarChart>
                                        </ResponsiveContainer>
                                        {/* Display small preview image in the deep dive */}
                                        <div className="absolute top-0 right-0 w-24 h-24 rounded-lg overflow-hidden border-2 border-slate-700 opacity-80 group-hover:opacity-100 transition-opacity">
                                            <img 
                                                src={imageMap[selectedPiece]?.[0]} 
                                                className="w-full h-full object-cover" 
                                                alt={`Piece ${selectedPiece}`}
                                                onError={(e) => { e.target.src = "https://placehold.co/100x100?text=NA"; }}
                                            />
                                        </div>
                                    </div>
                                    <div className="space-y-6">
                                        <div>
                                            <h3 className="text-4xl font-black text-blue-400 mb-1">{analysis.find(p => p.id === selectedPiece).avg}</h3>
                                            <p className="text-slate-400 uppercase tracking-widest text-xs font-bold">Average Score</p>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-slate-700/50 p-4 rounded-xl">
                                                <p className="text-slate-400 text-xs mb-1">Consistency</p>
                                                <p className="text-lg font-bold">{analysis.find(p => p.id === selectedPiece).stdDev < 12 ? 'Very High' : 'Mixed'}</p>
                                            </div>
                                            <div className="bg-slate-700/50 p-4 rounded-xl">
                                                <p className="text-slate-400 text-xs mb-1">Impact</p>
                                                <p className="text-lg font-bold">{analysis.find(p => p.id === selectedPiece).criteriaAvgs.find(c => c.subject === 'Dialogue').A.toFixed(1)}/10</p>
                                            </div>
                                        </div>
                                        {/* Showcase all images for collection pieces in the deep dive */}
                                        {imageMap[selectedPiece]?.length > 1 && (
                                            <div className="bg-slate-900/40 p-3 rounded-xl">
                                                <p className="text-[10px] text-slate-500 uppercase font-bold mb-2">Collection Contents</p>
                                                <div className="flex gap-2">
                                                    {imageMap[selectedPiece].map((src, i) => (
                                                        <img key={i} src={src} className="h-12 w-12 rounded bg-slate-800 object-cover" alt="" />
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ) : (
                                <div className="h-48 flex items-center justify-center text-slate-500 border-2 border-dashed border-slate-700 rounded-xl relative z-10">
                                    <p>Click a chart element or use the selector to drill down</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
